<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>左右開花 — 被動收入體驗</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0a0a;
      --bg2:     #111;
      --bg3:     #181818;
      --gold:    #c9a84c;
      --gold-lt: #e2c97e;
      --text:    #f0ece0;
      --muted:   #8a8070;
      --muted-lt:#b0a898;
      --div:     rgba(201,168,76,0.18);
      --green:   #4caf6a;
      --red:     #c05050;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem; height: 48px;
      background: rgba(10,10,10,0.94);
      border-bottom: 1px solid var(--div);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px);
    }
    .back { color: var(--muted-lt); text-decoration: none; font-size: 0.72rem; letter-spacing: .1em; }
    .back:hover { color: var(--gold); }
    .nav-title { font-size: 0.78rem; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); flex: 1; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 2.5rem; padding: 0.7rem 1.25rem;
      background: var(--bg2); border-bottom: 1px solid var(--div);
    }
    .stat { text-align: center; }
    .stat-val { font-size: 1.3rem; font-weight: 400; color: var(--gold); line-height: 1; }
    .stat-lbl { font-size: 0.6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

    /* ── GAME BOARD ── */
    .board {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1rem;
      align-items: start;
    }

    /* ── SIDE ── */
    .side { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .side-label {
      font-size: 0.62rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
    }

    /* people grid */
    .people {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 5px;
      min-height: 44px; width: 100%;
    }
    .person {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--div);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      animation: popIn .25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* tank */
    .tank-outer {
      position: relative;
      width: 80px; height: 200px;
      border: 1.5px solid var(--gold);
      border-radius: 6px;
      background: var(--bg3);
      overflow: hidden;
    }
    .tank-water {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--gold) 0%, var(--gold-lt) 100%);
      transition: height .7s cubic-bezier(.4,0,.2,1);
      height: 0%;
    }
    .tank-val {
      position: absolute; bottom: 6px; left: 0; right: 0;
      text-align: center; font-size: 0.68rem; font-weight: 700;
      color: var(--bg); z-index: 2; mix-blend-mode: multiply;
      pointer-events: none;
    }
    .tank-val.light { mix-blend-mode: normal; color: var(--gold); }
    /* threshold marks */
    .t-mark {
      position: absolute; left: 0; right: 0;
      height: 1px; background: rgba(255,255,255,0.2);
      z-index: 3;
    }
    .t-mark-lbl {
      position: absolute; right: 4px;
      font-size: 0.45rem; color: rgba(255,255,255,0.4);
      z-index: 4; transform: translateY(-8px);
    }
    .t-mark.paid { background: rgba(201,168,76,0.7); }

    /* tier badges below tank */
    .tier-badges {
      display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
      min-height: 18px;
    }
    .badge {
      font-size: 0.5rem; padding: 2px 5px;
      border: 1px solid var(--div); color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase;
      transition: all .3s;
    }
    .badge.paid { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

    /* recruit button */
    .btn-recruit {
      width: 100%;
      background: none; border: 1px solid var(--div);
      color: var(--muted-lt); cursor: pointer;
      font-size: 0.78rem; letter-spacing: .08em;
      padding: 0.55rem 0; transition: all .2s;
    }
    .btn-recruit:hover { border-color: var(--gold); color: var(--gold); }
    .btn-recruit:active { background: rgba(201,168,76,0.08); }

    /* ── CENTER ── */
    .center {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 0 0.75rem;
      padding-top: 120px; /* push down to align with tanks */
    }
    .target-box {
      text-align: center; padding: 0.75rem 0.6rem;
      border: 1px solid var(--div); background: var(--bg2);
      min-width: 80px;
    }
    .target-box .lbl { font-size: 0.52rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
    .target-box .val { font-size: 1rem; color: var(--gold); font-weight: 400; margin: 3px 0; }
    .target-box .reward { font-size: 0.62rem; color: var(--green); }

    .vs { font-size: 0.55rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }

    .btn-week {
      width: 100%;
      background: var(--gold); color: var(--bg);
      border: none; cursor: pointer;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: .1em; padding: 0.65rem 0;
      transition: background .2s;
    }
    .btn-week:hover { background: var(--gold-lt); }
    .btn-fast {
      width: 100%;
      background: none; border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); cursor: pointer;
      font-size: 0.68rem; letter-spacing: .1em;
      padding: 0.45rem 0; transition: all .2s;
    }
    .btn-fast:hover { background: rgba(201,168,76,0.07); }

    /* ── PAYOUT LOG ── */
    .log-wrap {
      max-width: 640px; width: 100%; margin: 0 auto;
      padding: 0 1rem 1.5rem;
    }
    .log-title { font-size: 0.58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .log-list { display: flex; flex-direction: column; gap: 0; }
    .log-item {
      font-size: 0.75rem; color: var(--muted-lt);
      padding: 0.35rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; justify-content: space-between;
    }
    .log-item .amt { color: var(--gold); font-weight: 600; }
    .log-empty { font-size: 0.75rem; color: var(--muted); font-style: italic; }

    /* ── HOW TO HINT ── */
    .hint {
      max-width: 640px; width: 100%; margin: 0 auto 0;
      padding: 0 1rem 0.5rem;
      font-size: 0.72rem; color: var(--muted);
      line-height: 1.6; text-align: center;
    }

    /* ── CELEBRATE OVERLAY ── */
    #celebrate {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 999;
      opacity: 0; transition: opacity .2s;
    }
    #celebrate .bubble {
      background: var(--bg2);
      border: 2px solid var(--gold);
      padding: 1.25rem 2rem;
      text-align: center;
      box-shadow: 0 0 60px rgba(201,168,76,0.3);
      transform: scale(0.8);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    #celebrate.show { opacity: 1; }
    #celebrate.show .bubble { transform: scale(1); }
    .celebrate-emoji { font-size: 2.5rem; line-height: 1; }
    .celebrate-ntd { font-size: 1.4rem; font-weight: 400; color: var(--gold); margin-top: 0.3rem; }
    .celebrate-label { font-size: 0.7rem; color: var(--muted-lt); letter-spacing: .08em; margin-top: 0.15rem; }

    /* ── RESET ── */
    .reset-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.65rem; letter-spacing: .1em;
      color: var(--muted); text-decoration: underline; text-underline-offset: 3px;
      padding: 0.4rem;
    }
    .reset-btn:hover { color: var(--red); }

    @media (max-width: 400px) {
      .tank-outer { width: 68px; height: 180px; }
      .board { padding: 1rem 0.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="back">← 返回</a>
  <span class="nav-title">左右開花</span>
  <button class="reset-btn" onclick="reset()">重新開始</button>
</nav>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-val" id="s-week">1</div>
    <div class="stat-lbl">第幾週</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="s-earn">NT$0</div>
    <div class="stat-lbl">累計收入</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="s-ppl">0 人</div>
    <div class="stat-lbl">總夥伴數</div>
  </div>
</div>

<!-- Game board -->
<div class="board">

  <!-- LEFT SIDE -->
  <div class="side">
    <div class="side-label">左邊</div>
    <div class="people" id="left-ppl"></div>
    <div class="tank-outer" id="left-tank">
      <div class="tank-water" id="left-water"></div>
      <div class="tank-val light" id="left-pts">0</div>
    </div>
    <div class="tier-badges" id="left-badges"></div>
    <button class="btn-recruit" onclick="recruit('left')">＋ 加入左邊</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="target-box">
      <div class="lbl">目標</div>
      <div class="val" id="c-target">1,200</div>
      <div class="reward" id="c-reward">+NT$9,500</div>
    </div>
    <div class="vs">兩邊<br>同時<br>到達</div>
    <button class="btn-week" onclick="nextWeek()">▶<br>下一週</button>
    <button class="btn-fast" onclick="fastFwd()">▶▶ 快轉<br>10 週</button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="side">
    <div class="side-label">右邊</div>
    <div class="people" id="right-ppl"></div>
    <div class="tank-outer" id="right-tank">
      <div class="tank-water" id="right-water"></div>
      <div class="tank-val light" id="right-pts">0</div>
    </div>
    <div class="tier-badges" id="right-badges"></div>
    <button class="btn-recruit" onclick="recruit('right')">＋ 加入右邊</button>
  </div>

</div>

<!-- Hint -->
<div class="hint" id="hint-text">
  招募夥伴後，每週自動累積業績。<br>
  <strong style="color:var(--gold-lt)">兩邊同時達標才能領收入</strong>——這就是「左右開花」的關鍵。
</div>

<!-- Log -->
<div class="log-wrap">
  <div class="log-title">收入紀錄</div>
  <div class="log-list" id="log"><div class="log-empty">還沒有收入，快去招募夥伴吧！</div></div>
</div>

<!-- Celebrate overlay -->
<div id="celebrate">
  <div class="bubble">
    <div class="celebrate-emoji" id="cel-emoji">💰</div>
    <div class="celebrate-ntd"  id="cel-ntd">+NT$9,500</div>
    <div class="celebrate-label" id="cel-lbl">兩邊同時達標，收入解鎖！</div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────
const PTS_PER_PERSON = 200;   // pts each person generates per week
const MAX_PTS        = 5000;  // tank max (for display scaling)

const TIERS = [
  { pts: 1200, ntd: 9500,  emoji: '🥉', label: '首次達標！'    },
  { pts: 2400, ntd: 9500,  emoji: '🥈', label: '二度達標！'    },
  { pts: 3600, ntd: 9500,  emoji: '🥇', label: '三度達標！'    },
  { pts: 5000, ntd: 19000, emoji: '🏆', label: '滿額！下輪開始', flush: true },
];

const PEOPLE_EMOJI = ['😊','🙋','🧑','👩','👨','👦','👧','🧔','👱','🤝','💼','✨'];

// ── STATE ──────────────────────────────────────
let G = {};

function mkState() {
  return {
    week: 1,
    lPpl: 0, rPpl: 0,
    lPts: 0, rPts: 0,
    tiers: [false,false,false,false],
    totalNTD: 0,
    log: [],
  };
}

// ── ACTIONS ────────────────────────────────────
function recruit(side) {
  if (side === 'left')  G.lPpl++;
  else                  G.rPpl++;
  render();
  updateHint();
}

function nextWeek() {
  G.week++;
  G.lPts = Math.min(G.lPts + G.lPpl * PTS_PER_PERSON, MAX_PTS * 2);
  G.rPts = Math.min(G.rPts + G.rPpl * PTS_PER_PERSON, MAX_PTS * 2);
  checkTiers();
  render();
}

function fastFwd() {
  for (let i = 0; i < 10; i++) {
    G.week++;
    G.lPts = Math.min(G.lPts + G.lPpl * PTS_PER_PERSON, MAX_PTS * 2);
    G.rPts = Math.min(G.rPts + G.rPpl * PTS_PER_PERSON, MAX_PTS * 2);
    checkTiers();
  }
  render();
}

function reset() {
  G = mkState();
  render();
  updateHint();
}

// ── TIER CHECK ─────────────────────────────────
function checkTiers() {
  const min = Math.min(G.lPts, G.rPts);
  TIERS.forEach((t, i) => {
    if (!G.tiers[i] && min >= t.pts) {
      G.tiers[i] = true;
      G.totalNTD += t.ntd;
      G.log.unshift({ week: G.week, tier: i, ntd: t.ntd, emoji: t.emoji, label: t.label });
      celebrate(t.emoji, t.ntd, t.label);
      if (t.flush) {
        setTimeout(() => {
          G.lPts = 0; G.rPts = 0;
          G.tiers = [false,false,false,false];
          render();
        }, 1400);
      }
    }
  });
}

// ── CELEBRATE ──────────────────────────────────
let celTimer;
function celebrate(emoji, ntd, label) {
  clearTimeout(celTimer);
  document.getElementById('cel-emoji').textContent = emoji;
  document.getElementById('cel-ntd').textContent   = '+NT$' + ntd.toLocaleString();
  document.getElementById('cel-lbl').textContent   = label;
  const el = document.getElementById('celebrate');
  el.classList.add('show');
  celTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── RENDER ─────────────────────────────────────
function render() {
  // Stats bar
  document.getElementById('s-week').textContent = G.week;
  document.getElementById('s-earn').textContent = 'NT$' + G.totalNTD.toLocaleString();
  document.getElementById('s-ppl').textContent  = (G.lPpl + G.rPpl) + ' 人';

  // People
  renderPeople('left-ppl',  G.lPpl);
  renderPeople('right-ppl', G.rPpl);

  // Tanks
  renderTank('left-water',  'left-pts',  G.lPts);
  renderTank('right-water', 'right-pts', G.rPts);
  renderTankMarks('left-tank',  G.tiers);
  renderTankMarks('right-tank', G.tiers);

  // Tier badges
  renderBadges('left-badges');
  renderBadges('right-badges');

  // Next target
  const next = TIERS.find((t, i) => !G.tiers[i]);
  if (next) {
    document.getElementById('c-target').textContent = next.pts.toLocaleString();
    document.getElementById('c-reward').textContent = '+NT$' + next.ntd.toLocaleString();
  } else {
    document.getElementById('c-target').textContent = '—';
    document.getElementById('c-reward').textContent = '本輪完成！';
  }

  // Log
  renderLog();
}

function renderPeople(elId, count) {
  const el = document.getElementById(elId);
  el.innerHTML = Array.from({ length: count }, (_, i) =>
    `<span class="person">${PEOPLE_EMOJI[i % PEOPLE_EMOJI.length]}</span>`
  ).join('');
}

function renderTank(waterId, ptsId, pts) {
  const pct = Math.min(pts / MAX_PTS * 100, 100);
  document.getElementById(waterId).style.height = pct + '%';
  document.getElementById(ptsId).textContent = pts.toLocaleString();
  // switch text color based on fill
  const valEl = document.getElementById(ptsId);
  valEl.classList.toggle('light', pct < 30);
}

let marksDrawn = { 'left-tank': false, 'right-tank': false };
function renderTankMarks(tankId, tiers) {
  if (marksDrawn[tankId]) {
    // just update paid state
    const tank = document.getElementById(tankId);
    tank.querySelectorAll('.t-mark').forEach((m, i) => {
      m.classList.toggle('paid', tiers[i]);
    });
    return;
  }
  marksDrawn[tankId] = true;
  const tank = document.getElementById(tankId);
  TIERS.forEach((t, i) => {
    const pct = (1 - t.pts / MAX_PTS) * 100; // bottom-up
    const mark = document.createElement('div');
    mark.className = 'at-mark t-mark' + (tiers[i] ? ' paid' : '');
    mark.style.bottom = (t.pts / MAX_PTS * 100) + '%';
    tank.appendChild(mark);
    const lbl = document.createElement('div');
    lbl.className = 't-mark-lbl';
    lbl.style.bottom = (t.pts / MAX_PTS * 100 + 0.5) + '%';
    lbl.textContent = t.pts.toLocaleString();
    tank.appendChild(lbl);
  });
}

function renderBadges(elId) {
  const el = document.getElementById(elId);
  el.innerHTML = TIERS.map((t, i) =>
    `<span class="badge ${G.tiers[i] ? 'paid' : ''}">${t.emoji}</span>`
  ).join('');
}

function renderLog() {
  const el = document.getElementById('log');
  if (G.log.length === 0) {
    el.innerHTML = '<div class="log-empty">還沒有收入，快去招募夥伴吧！</div>';
    return;
  }
  el.innerHTML = G.log.slice(0, 10).map(e =>
    `<div class="log-item">
      <span>${e.emoji} 第 ${e.week} 週・${e.label}</span>
      <span class="amt">+NT$${e.ntd.toLocaleString()}</span>
    </div>`
  ).join('');
}

// ── DYNAMIC HINT ───────────────────────────────
function updateHint() {
  const el = document.getElementById('hint-text');
  if (G.lPpl === 0 && G.rPpl === 0) {
    el.innerHTML = '招募夥伴後，每週自動累積業績。<br><strong style="color:var(--gold-lt)">兩邊同時達標才能領收入</strong>——這就是「左右開花」的關鍵。';
  } else if (G.lPpl > 0 && G.rPpl === 0) {
    el.innerHTML = '⚠ 只有左邊有人，右邊業績是 0，<strong style="color:var(--red)">無法觸發收入</strong>。記得右邊也要發展！';
  } else if (G.lPpl === 0 && G.rPpl > 0) {
    el.innerHTML = '⚠ 只有右邊有人，左邊業績是 0，<strong style="color:var(--red)">無法觸發收入</strong>。記得左邊也要發展！';
  } else {
    const ratio = Math.min(G.lPpl, G.rPpl) / Math.max(G.lPpl, G.rPpl);
    if (ratio < 0.5) {
      el.innerHTML = '💡 兩邊人數差距太大，<strong style="color:var(--gold-lt)">業績會卡在慢的那側</strong>。建議平衡發展！';
    } else {
      el.innerHTML = '✅ 兩邊都有人，業績每週穩定累積。<strong style="color:var(--green)">按「下一週」看看會發生什麼！</strong>';
    }
  }
}

// ── INIT ───────────────────────────────────────
G = mkState();
render();
</script>
</body>
</html>
