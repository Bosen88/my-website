<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>服務介紹</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg-2:      #111111;
      --bg-3:      #181818;
      --gold:      #c9a84c;
      --gold-lt:   #e2c97e;
      --gold-dk:   #9a7a30;
      --divider:   rgba(201,168,76,0.18);
      --text:      #f0ece0;
      --muted:     #8a8070;
      --muted-lt:  #b0a898;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Didot", "Playfair Display", "Noto Serif TC",
                   Georgia, serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Placeholder helpers ── */
    .ph-img {
      background: var(--bg-3);
      border: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-family: -apple-system, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .ph-line {
      background: var(--bg-3);
      border-radius: 2px;
      display: block;
      height: 1em;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: 56px;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--divider);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
    }

    .nav-logo {
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: -apple-system, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-lt);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }

    @media (max-width: 540px) { .nav-links { display: none; } }

    /* ── Shared ── */
    section { overflow: hidden; }

    .container {
      max-width: 1020px;
      margin: 0 auto;
      padding: 0 clamp(1.25rem, 5vw, 2rem);
    }

    .section-label {
      font-family: -apple-system, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* gold rule — short accent line */
    .gold-rule {
      display: block;
      width: 36px;
      height: 1px;
      background: var(--gold);
      margin: 0 0 1.5rem;
    }
    .gold-rule.center { margin: 0 auto 1.5rem; }

    /* gradient divider between sections */
    .section-divider {
      display: block;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent 0%,
        var(--gold) 30%,
        var(--gold) 70%,
        transparent 100%
      );
      opacity: 0.35;
    }

    /* ═══════════════════════════════
       ①  HERO
    ═══════════════════════════════ */
    #hero {
      min-height: 100svh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 2rem 5rem;
      gap: 0;
    }

    /* tightly group the text block, then breathe before image */
    .hero-text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .hero-eyebrow .ph-line {
      width: 100px;
      height: 0.68em;
      margin: 0 auto;
      background: var(--bg-3);
    }

    /* scroll hint */
    .scroll-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 3rem;
      opacity: 0.45;
    }
    .scroll-hint span {
      font-family: -apple-system, sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted-lt);
    }
    .scroll-hint svg {
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    #hero h1 {
      font-size: clamp(3rem, 7.5vw, 6.5rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.05;
      color: var(--text);
    }
    #hero h1 .ph-line {
      width: min(540px, 82vw);
      height: 1.05em;
      margin: 0 auto;
    }

    .hero-sub {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
    }
    .hero-sub .ph-line:nth-child(1) { width: min(400px, 72vw); }
    .hero-sub .ph-line:nth-child(2) { width: min(300px, 58vw); }

    .hero-cta { display: flex; gap: 1.25rem; flex-wrap: wrap; justify-content: center; }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      padding: 0.75rem 2rem;
      font-family: -apple-system, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      background: var(--gold);
      color: var(--bg);
      transition: background 0.25s;
    }
    .btn-primary:hover { background: var(--gold-lt); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 2rem;
      font-family: -apple-system, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold);
      border: 1px solid var(--divider);
      transition: border-color 0.25s, color 0.25s;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold-lt); }

    .hero-img-wrap { width: 100%; max-width: 900px; }
    .hero-img-wrap .ph-img {
      width: 100%;
      aspect-ratio: 16/9;
    }

    /* ═══════════════════════════════
       ②  ABOUT
    ═══════════════════════════════ */
    #about {
      background: var(--bg-2);
      padding: 8rem 0;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
    }

    .about-photo .ph-img {
      width: 100%;
      aspect-ratio: 4/5;
    }

    .about-copy { display: flex; flex-direction: column; gap: 1.5rem; }

    .about-copy h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.1;
      color: var(--text);
    }
    .about-copy h2 .ph-line { height: 1.1em; margin-bottom: 0.55rem; }
    .about-copy h2 .ph-line:nth-child(1) { width: 85%; }
    .about-copy h2 .ph-line:nth-child(2) { width: 58%; }

    .about-desc { display: flex; flex-direction: column; gap: 0.6rem; }
    .about-desc .ph-line:nth-child(1) { width: 100%; }
    .about-desc .ph-line:nth-child(2) { width: 100%; }
    .about-desc .ph-line:nth-child(3) { width: 88%; }
    .about-desc .ph-line:nth-child(4) { width: 72%; }

    .about-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border: 1px solid var(--divider);
      font-family: -apple-system, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-lt);
    }

    @media (max-width: 700px) {
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .about-photo { order: -1; }
      .about-photo .ph-img { aspect-ratio: 3/2; }
    }

    /* ═══════════════════════════════
       ③  SERVICES
    ═══════════════════════════════ */
    #services {
      background: var(--bg);
      padding: 8rem 0;
    }

    .services-header {
      text-align: center;
      margin-bottom: 5rem;
    }

    .services-header h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-top: 0.75rem;
    }
    .services-header .ph-line {
      width: 200px;
      height: 0.8em;
      margin: 1rem auto 0;
    }

    .service-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--divider);
    }

    @media (max-width: 700px) {
      .service-cards { grid-template-columns: 1fr; }
      .service-card + .service-card { border-top: 1px solid var(--divider); border-left: none; }
      .service-card { padding: 2rem 1.5rem; }
    }

    .service-card {
      background: var(--bg);
      padding: 2.75rem 2.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    }
    .service-card + .service-card { border-left: 1px solid var(--divider); }
    .service-card:hover {
      background: var(--bg-2);
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(201,168,76,0.1), 0 4px 12px rgba(201,168,76,0.06);
      z-index: 1;
      position: relative;
    }

    .card-img-wrap .ph-img {
      width: 100%;
      aspect-ratio: 4/3;
    }

    .card-number {
      font-family: -apple-system, sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dk);
    }

    .card-title-text {
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      line-height: 1.25;
      color: var(--text);
    }
    .card-title-text .ph-line { width: 70%; height: 1.1em; }

    .card-desc-lines { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
    .card-desc-lines .ph-line:nth-child(1) { width: 100%; }
    .card-desc-lines .ph-line:nth-child(2) { width: 83%; }
    .card-desc-lines .ph-line:nth-child(3) { width: 62%; }

    .card-price-row {
      padding-top: 1.25rem;
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .price-from {
      font-family: -apple-system, sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .price-from .ph-line { width: 52px; height: 0.72em; }

    .price-amount { display: flex; align-items: baseline; gap: 0.3rem; }
    .price-amount .ph-line      { width: 80px; height: 1.15em; background: rgba(201,168,76,0.15); }
    .price-amount .ph-line.unit { width: 28px; height: 0.7em;  background: rgba(201,168,76,0.1); }

    /* ═══════════════════════════════
       ④  CONTACT
    ═══════════════════════════════ */
    #contact {
      background: var(--bg-2);
      padding: 8rem 0;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
    }

    .contact-img .ph-img {
      width: 100%;
      aspect-ratio: 1;
    }

    .contact-copy { display: flex; flex-direction: column; gap: 1.5rem; }

    .contact-copy h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .contact-copy h2 .ph-line { height: 1.1em; margin-bottom: 0.55rem; }
    .contact-copy h2 .ph-line:nth-child(1) { width: 80%; }
    .contact-copy h2 .ph-line:nth-child(2) { width: 52%; }

    .contact-desc { display: flex; flex-direction: column; gap: 0.55rem; }
    .contact-desc .ph-line:nth-child(1) { width: 100%; }
    .contact-desc .ph-line:nth-child(2) { width: 86%; }
    .contact-desc .ph-line:nth-child(3) { width: 62%; }

    .contact-items { display: flex; flex-direction: column; gap: 1.1rem; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid var(--divider);
    }
    .contact-item:last-child { border-bottom: none; }

    .contact-icon {
      width: 34px; height: 34px;
      border: 1px solid var(--divider);
      flex-shrink: 0;
      background: var(--bg-3);
    }
    .contact-item-text { display: flex; flex-direction: column; gap: 0.35rem; }
    .contact-item-text .ph-line:nth-child(1) { width: 100px; height: 0.65em; }
    .contact-item-text .ph-line:nth-child(2) { width: 150px; height: 0.88em; }

    @media (max-width: 700px) {
      .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .contact-img { order: -1; }
      .contact-img .ph-img { aspect-ratio: 3/2; }
    }

    /* ── Mobile sweep ── */
    @media (max-width: 640px) {
      /* nav */
      nav { padding: 0 1.25rem; }

      /* hero */
      #hero {
        padding: 5.5rem 1.25rem 3.5rem;
      }
      .hero-text-group { gap: 1.25rem; margin-bottom: 2rem; }
      #hero h1 { font-size: clamp(2.2rem, 10vw, 3rem); }
      .scroll-hint { display: none; }
      .hero-cta {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        max-width: 320px;
      }
      .btn-primary,
      .btn-ghost {
        justify-content: center;
        padding: 1rem 1.5rem;
      }

      /* sections */
      #about,
      #services,
      #contact { padding: 4.5rem 0; }

      /* about */
      .about-copy h2 { font-size: clamp(1.7rem, 7vw, 2.2rem); }
      .about-copy h2 .ph-line:nth-child(1) { width: 90%; }
      .about-copy h2 .ph-line:nth-child(2) { width: 68%; }

      /* services header */
      .services-header { margin-bottom: 3rem; }
      .services-header h2 { font-size: clamp(1.7rem, 7vw, 2.2rem); }
      .services-header .ph-line { width: min(200px, 60vw); }

      /* contact */
      .contact-copy h2 { font-size: clamp(1.7rem, 7vw, 2.2rem); }
      .contact-copy h2 .ph-line:nth-child(1) { width: 88%; }
      .contact-copy h2 .ph-line:nth-child(2) { width: 60%; }
      .contact-item-text .ph-line:nth-child(2) { width: min(150px, 55vw); }
    }

    /* ── Footer ── */
    footer {
      background: var(--bg);
      border-top: 1px solid var(--divider);
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: -apple-system, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-logo { color: var(--gold); letter-spacing: 0.2em; }

    .footer-social {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    .footer-social a {
      display: flex;
      color: var(--muted);
      transition: color 0.2s;
    }
    .footer-social a:hover { color: var(--gold); }

    @media (max-width: 540px) {
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
